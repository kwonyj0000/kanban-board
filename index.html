<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>

  <!-- 인증 확인 중 로딩 -->
  <div id="auth-loading" class="auth-loading">
    <p>로딩 중...</p>
  </div>

  <!-- 초대 알림 배너 -->
  <div id="invite-banner" class="invite-banner hidden">
    <span id="invite-notice">보드에 초대받았습니다.</span>
    <div class="invite-banner-actions">
      <button id="accept-invite-btn" class="banner-btn accept">수락</button>
      <button id="dismiss-banner" class="banner-btn dismiss">닫기</button>
    </div>
  </div>

  <header id="main-header" style="display:none">
    <h1 id="board-title">Kanban Board</h1>
    <div class="user-info">
      <select id="board-switcher" class="board-switcher" style="display:none"></select>
      <span id="user-email"></span>
      <button id="share-btn" class="share-btn" style="display:none">공유</button>
      <button id="logout-btn">로그아웃</button>
    </div>
  </header>

  <main class="board" id="main-board" style="display:none">
    <section class="column" id="todo">
      <div class="column-header todo-header">
        <h2>To-do</h2>
        <span class="badge" id="todo-badge">0</span>
        <button class="add-btn" data-target="todo" title="카드 추가">+</button>
      </div>
      <div class="card-list" id="todo-list"></div>
    </section>

    <section class="column" id="inprogress">
      <div class="column-header inprogress-header">
        <h2>In-progress</h2>
        <span class="badge" id="inprogress-badge">0</span>
        <button class="add-btn" data-target="inprogress" title="카드 추가">+</button>
      </div>
      <div class="card-list" id="inprogress-list"></div>
    </section>

    <section class="column" id="done">
      <div class="column-header done-header">
        <h2>Done</h2>
        <span class="badge" id="done-badge">0</span>
        <button class="add-btn" data-target="done" title="카드 추가">+</button>
      </div>
      <div class="card-list" id="done-list"></div>
    </section>
  </main>

  <!-- 공유 모달 -->
  <div id="share-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h2 class="modal-title">보드 공유</h2>
      <div class="invite-form">
        <input type="email" id="invite-email" class="auth-input" placeholder="팀원 이메일 입력">
        <button id="invite-btn" class="btn-primary invite-action-btn">초대</button>
      </div>
      <p id="invite-msg" class="invite-msg"></p>
      <h3 class="member-list-title">팀원 목록</h3>
      <ul id="member-list" class="member-list"></ul>
      <button id="close-modal" class="modal-close-btn">닫기</button>
    </div>
  </div>

  <!-- app.js 자동 init 비활성화 → 인증 확인 후 수동 호출 -->
  <script>window.__skipAutoInit = true;</script>
  <script src="app.js"></script>

  <script>
    let boardReady = false;

    async function showBoard(session, boardIdOverride) {
      if (boardReady) return;
      boardReady = true;

      window.__userId   = session.user.id;
      const ownBoardId  = await getOrCreateDefaultBoard(session.user.id);
      window.__ownBoardId = ownBoardId;
      window.__boardId  = boardIdOverride || ownBoardId;
      window.__isOwner  = window.__boardId === ownBoardId;

      document.getElementById('user-email').textContent =
        session.user.email || session.user.user_metadata?.full_name || '사용자';

      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('main-header').style.display  = '';
      document.getElementById('main-board').style.display   = '';

      if (window.__isOwner) {
        document.getElementById('share-btn').style.display = '';
      }

      await init();
      await setupBoardTitle();
      await setupInviteBanner();
      await setupBoardSwitcher();
    }

    /* 보드 제목 표시 + 소유자일 때 인라인 편집 */
    async function setupBoardTitle() {
      const title = await getBoardTitle(window.__boardId);
      const el = document.getElementById('board-title');
      el.textContent = title;

      el.onclick = null;
      el.classList.remove('editable');

      if (!window.__isOwner) return;

      el.classList.add('editable');
      el.title = '클릭하여 제목 수정';

      el.onclick = () => {
        if (el.querySelector('input')) return;
        const prev = el.textContent;
        el.textContent = '';

        const input = document.createElement('input');
        input.type = 'text';
        input.value = prev;
        input.className = 'title-edit-input';
        el.appendChild(input);
        input.focus();
        input.select();

        let done = false;
        const finish = async (save) => {
          if (done) return;
          done = true;
          const next = input.value.trim() || prev;
          el.textContent = save ? next : prev;
          if (save && next !== prev) {
            const { error } = await updateBoardTitle(window.__boardId, next);
            if (error) { el.textContent = prev; return; }
            /* 보드 전환 셀렉터 옵션 텍스트도 갱신 */
            const opt = document.querySelector(`#board-switcher option[value="${window.__boardId}"]`);
            if (opt) opt.textContent = next;
          }
        };

        input.onblur  = () => finish(true);
        input.onkeydown = (e) => {
          if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
          if (e.key === 'Escape') { done = false; finish(false); }
        };
      };
    }

    /* 보드 전환 셀렉터 — 수락된 공유 보드가 있을 때만 표시 */
    async function setupBoardSwitcher() {
      const sharedBoards = await getAcceptedSharedBoards();
      const switcher = document.getElementById('board-switcher');

      if (!sharedBoards.length) {
        switcher.style.display = 'none';
        return;
      }

      switcher.style.display = '';
      switcher.innerHTML = `<option value="${window.__ownBoardId}">내 보드</option>`;
      sharedBoards.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = b.title || '공유 보드';
        switcher.appendChild(opt);
      });
      switcher.value = window.__boardId;

      switcher.onchange = async () => {
        const selectedId = switcher.value;
        const isOwner    = selectedId === window.__ownBoardId;
        window.__boardId = selectedId;
        window.__isOwner = isOwner;
        document.getElementById('share-btn').style.display = isOwner ? '' : 'none';
        if (window.__realtimeChannel) window.__realtimeChannel.unsubscribe();
        const data = await loadCardsFromSupabase();
        renderBoard(data || { todo: [], inprogress: [], done: [] });
        window.__realtimeChannel = subscribeToBoardCards(window.__boardId, async () => {
          const d = await loadCardsFromSupabase();
          if (d) renderBoard(d);
        });
        await setupBoardTitle();
      };
    }

    async function setupInviteBanner() {
      const invitations = await getPendingInvitations();
      if (!invitations.length) return;

      const inv    = invitations[0];
      const banner = document.getElementById('invite-banner');
      banner.classList.remove('hidden');

      document.getElementById('accept-invite-btn').onclick = async () => {
        const { error } = await acceptInvitation(inv.id);
        if (!error) {
          banner.classList.add('hidden');
          window.__boardId = inv.board_id;
          window.__isOwner = false;
          document.getElementById('share-btn').style.display = 'none';
          if (window.__realtimeChannel) window.__realtimeChannel.unsubscribe();
          const data = await loadCardsFromSupabase();
          renderBoard(data || { todo: [], inprogress: [], done: [] });
          window.__realtimeChannel = subscribeToBoardCards(window.__boardId, async () => {
            const d = await loadCardsFromSupabase();
            if (d) renderBoard(d);
          });
          /* 수락 후 제목·셀렉터 갱신 */
          await setupBoardTitle();
          await setupBoardSwitcher();
        }
      };

      document.getElementById('dismiss-banner').onclick = () => {
        banner.classList.add('hidden');
      };
    }

    /* 세션 변경 감지 — 매직링크 / OAuth 콜백 처리 포함 */
    onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        showBoard(session);
      } else if (event === 'SIGNED_OUT') {
        window.location.replace('login.html');
      }
    });

    /* 이미 세션이 있으면 즉시 보드 표시 */
    (async () => {
      const session = await getSession();
      if (session) {
        showBoard(session);
      } else {
        /* 매직링크/OAuth 콜백 코드가 URL에 있으면 onAuthStateChange 대기,
           없으면 로그인 페이지로 이동 */
        const hasCode = new URLSearchParams(window.location.search).has('code');
        if (!hasCode) {
          window.location.replace('login.html');
        }
      }
    })();

    /* 로그아웃 */
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut();
      /* signOut 후 onAuthStateChange SIGNED_OUT → login.html 이동 */
    });
  </script>
</body>
</html>
